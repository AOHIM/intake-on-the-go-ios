
workflows:
  ios-workflow:
    name: Intake on-the-Go iOS
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
    scripts:
      - name: Unzip project
        script: |
          unzip "Intake_on-the-Go_fixed 05-06-26.zip"
      - name: Install CocoaPods
        script: |
          cd src
          pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files \
            org.aohministry.intakeonthego \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates
        script: keychain add-certificates
      - name: Set up code signing
        script: |
          cd src
          xcode-project use-profiles
      - name: Build IPA
        script: |
          cd src
          xcode-project build-ipa \
            --workspace "Intake on-the-Go.xcworkspace" \
            --scheme "Intake on-the-Go"
          echo "=== FINDING IPA FILES ==="
          find /Users/builder -name "*.ipa" 2>/dev/null
          find /Users/builder/clone -name "*.ipa" 2>/dev/null
    artifacts:
      - "**/*.ipa"
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
