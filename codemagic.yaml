workflows:
  ios-workflow:
    name: Intake on-the-Go iOS
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Unzip project
        script: |
          unzip "Intake on-the-Go.zip"
      - name: Install CocoaPods
        script: |
          cd src
          pod install
      - name: Build iOS
        script: |
          cd src
          xcode-project use-profiles
          xcodebuild -workspace "Intake on-the-Go.xcworkspace" \
            -scheme "Intake on-the-Go" \
            -configuration Release \
            -archivePath build/Intake-on-the-Go.xcarchive \
            archive
    artifacts:
      - src/build/Intake-on-the-Go.xcarchive
