
workflows:
  ios-workflow:
    name: Intake on-the-Go iOS
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: org.aohministry.intakeonthego
    scripts:
      - name: Unzip project
        script: |
          unzip "Intake_on-the-Go_fixed 05-06-26.zip"
      - name: Install CocoaPods
        script: |
          cd src
          pod install
      - name: Build iOS
        script: |
          cd src
          xcodebuild -workspace "Intake on-the-Go.xcworkspace" \
            -scheme "Intake on-the-Go" \
            -configuration Release \
            -archivePath build/Intake-on-the-Go.xcarchive \
            -allowProvisioningUpdates \
            archive
      - name: Export IPA
        script: |
          cd src
          xcode-project build-ipa \
            --workspace "Intake on-the-Go.xcworkspace" \
            --scheme "Intake on-the-Go"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
