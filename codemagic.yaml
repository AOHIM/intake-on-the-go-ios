workflows:
  ios-workflow:
    name: Intake on-the-Go iOS
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
    scripts:
      - name: Unzip project
        script: |
          unzip *.zip
      - name: Fix app icon alpha channel
        script: |
          pip install Pillow --break-system-packages -q
          python3 << 'PYEOF'
          from PIL import Image
          import os
          icon_path = "src/Intake on-the-Go/Assets.xcassets/AppIcon.appiconset/1024.png"
          img = Image.open(icon_path)
          if img.mode in ('RGBA', 'LA', 'P'):
              bg = Image.new('RGB', img.size, (255, 255, 255))
              if img.mode == 'P':
                  img = img.convert('RGBA')
              bg.paste(img, mask=img.split()[-1] if img.mode == 'RGBA' else None)
              bg.save(icon_path, 'PNG')
              print('Icon fixed - alpha channel removed')
          else:
              print('No fix needed, mode: ' + img.mode)
          PYEOF
      - name: Install CocoaPods
        script: |
          cd src
          pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files \
            org.aohministry.intakeonthego \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates
        script: keychain add-certificates
      - name: Set up code signing
        script: |
          cd src
          xcode-project use-profiles
      - name: Build IPA
        script: |
          cd src
          xcode-project build-ipa \
            --workspace "Intake on-the-Go.xcworkspace" \
            --scheme "Intake on-the-Go"
    artifacts:
      - "**/*.ipa"
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
